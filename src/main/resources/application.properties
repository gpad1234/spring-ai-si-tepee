# ─── Server ───────────────────────────────────────────────────────────────────
server.port=8080

# ─── Anthropic / Claude ───────────────────────────────────────────────────────
# Set ANTHROPIC_API_KEY environment variable — never hardcode here
spring.ai.anthropic.api-key=${ANTHROPIC_API_KEY}
spring.ai.anthropic.chat.options.model=claude-opus-4-5
spring.ai.anthropic.chat.options.max-tokens=2048
spring.ai.anthropic.chat.options.temperature=0.7

# ─── Embedding (local transformer model for in-memory vector store) ───────────
# For production, switch to spring.ai.openai.embedding or a dedicated service
spring.ai.embedding.transformer.onnx.modelUri=classpath:/onnx/all-MiniLM-L6-v2.onnx
spring.ai.embedding.transformer.tokenizer.uri=classpath:/onnx/tokenizer.json

# ─── Actuator ─────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
