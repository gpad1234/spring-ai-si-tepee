<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rich Chat MCP App</title>
    <style>
        :root {
            color-scheme: dark;
            --bg: #0a0a0f;
            --surface: #13131a;
            --surface-2: #1c1c28;
            --border: rgba(255,255,255,0.12);
            --text: #e2e8f0;
            --muted: #94a3b8;
            --accent: #7c3aed;
            --accent-2: #4f46e5;
            --cyan: #06b6d4;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: radial-gradient(circle at top, rgba(124,58,237,0.18), transparent 35%), var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 24px;
        }

        .shell {
            max-width: 840px;
            margin: 0 auto;
            border: 1px solid var(--border);
            background: rgba(19, 19, 26, 0.92);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.42);
        }

        .hero {
            padding: 20px 22px 14px;
            border-bottom: 1px solid var(--border);
            background: linear-gradient(135deg, rgba(124,58,237,0.16), rgba(79,70,229,0.08));
        }

        .eyebrow {
            margin: 0 0 8px;
            font-size: 12px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--cyan);
        }

        h1 {
            margin: 0;
            font-size: 28px;
            line-height: 1.15;
        }

        .subtitle {
            margin: 10px 0 0;
            color: var(--muted);
            font-size: 14px;
            max-width: 62ch;
        }

        .body {
            display: grid;
            gap: 18px;
            padding: 20px 22px 22px;
        }

        .panel {
            border: 1px solid var(--border);
            background: var(--surface);
            border-radius: 16px;
            padding: 16px;
        }

        .panel h2 {
            margin: 0 0 10px;
            font-size: 14px;
        }

        textarea {
            width: 100%;
            min-height: 148px;
            resize: vertical;
            border-radius: 14px;
            border: 1px solid var(--border);
            background: var(--surface-2);
            color: var(--text);
            padding: 14px;
            font: inherit;
        }

        .toolbar {
            display: flex;
            gap: 12px;
            justify-content: space-between;
            align-items: center;
            margin-top: 12px;
            flex-wrap: wrap;
        }

        .status {
            color: var(--muted);
            font-size: 13px;
        }

        button {
            border: 0;
            border-radius: 999px;
            padding: 10px 16px;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            color: white;
            font-weight: 600;
            cursor: pointer;
        }

        button.secondary {
            background: transparent;
            color: var(--text);
            border: 1px solid var(--border);
        }

        .preview {
            white-space: pre-wrap;
            line-height: 1.55;
            color: var(--text);
        }
    </style>
</head>
<body>
<div class="shell">
    <div class="hero">
        <p class="eyebrow">Pattern 6 Preview</p>
        <h1>Rich Chat Workspace</h1>
        <p class="subtitle">This preview MCP app demonstrates resource/tool wiring, model-context updates, and a backend response tool. Use tool <strong>rich-chat-respond</strong> from your MCP host to generate replies with the same ChatService used by REST chat.</p>
    </div>

    <div class="body">
        <div class="panel">
            <h2>Draft</h2>
            <textarea id="draft">Summarize the current MCP preview status and next implementation step.</textarea>
            <div class="toolbar">
                <div class="status" id="status">Connecting to host…</div>
                <div>
                    <button class="secondary" id="reset-btn" type="button">Reset</button>
                    <button id="share-btn" type="button">Share to Chat Context</button>
                </div>
            </div>
        </div>

        <div class="panel">
            <h2>Preview</h2>
            <div class="preview" id="preview"></div>
        </div>
    </div>
</div>

<script type="module">
    import { App } from "https://unpkg.com/@modelcontextprotocol/ext-apps@0.4.2/app-with-deps";

    const draft = document.getElementById("draft");
    const status = document.getElementById("status");
    const preview = document.getElementById("preview");
    const resetBtn = document.getElementById("reset-btn");
    const shareBtn = document.getElementById("share-btn");

    const initialText = draft.value;
    const app = new App({ name: "open-rich-chat", version: "0.1.0" });

    const renderPreview = () => {
        preview.textContent = draft.value.trim() || "Nothing drafted yet.";
    };

    const updateHostContext = async () => {
        const text = draft.value.trim() || "The rich chat workspace is open but has no draft text yet.";
        status.textContent = "Sharing current draft with chat context…";

        await app.updateModelContext({
            content: [{
                type: "text",
                text: `Rich chat workspace draft:\n\n${text}`
            }]
        });

        status.textContent = "Draft shared to chat context.";
    };

    app.connect()
        .then(() => {
            status.textContent = "Connected. Share draft to context, then invoke tool rich-chat-respond from host chat.";
            renderPreview();
        })
        .catch((error) => {
            status.textContent = `Host connection failed: ${error?.message ?? error}`;
            renderPreview();
        });

    draft.addEventListener("input", renderPreview);

    resetBtn.addEventListener("click", () => {
        draft.value = initialText;
        renderPreview();
        status.textContent = "Draft reset.";
    });

    shareBtn.addEventListener("click", async () => {
        try {
            await updateHostContext();
        } catch (error) {
            status.textContent = `Context update failed: ${error?.message ?? error}`;
        }
    });

    renderPreview();
</script>
</body>
</html>
